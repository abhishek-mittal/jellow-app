services:
  postgres:
    image: postgres:17-alpine
    container_name: jellow-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: jellow
      POSTGRES_PASSWORD: jellow_dev
      POSTGRES_DB: jellow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jellow"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
